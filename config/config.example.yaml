server:
  host: "0.0.0.0"
  port: 8000

auth:
  sourcePassword: "hackme"

ffmpeg:
  version: "7.1"
  sourceUrl: "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest"

archive:
  directory: "bin/archive"
  segmentDurationSec: 3600
  retentionDays: 7
  minFreeSpaceMB: 500

playlist:
  uploadDir: "bin/uploads"
  maxFileSizeMB: 500
  allowedExtensions:
    - ".mp3"
    - ".m4a"
    - ".aac"
    - ".ogg"
    - ".wav"
    - ".flac"

logging:
  directory: "logs"
  level: "info"
  retentionDays: 30
